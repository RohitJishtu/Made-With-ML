description: RAG assistant smoke tests
prompts:
  - |
      Answer using only this context: {{context}}
      Question: {{question}}
providers:
  - id: ollama:llama3.2:1b
    config:
      temperature: 0.1
tests:
  - vars:
      question: "What is MLOps?"
      context: "MLOps combines machine learning with software engineering for production systems."
    assert:
      - type: icontains
        value: mlops
  - vars:
      question: "What is quantum computing?"
      context: "MLOps combines machine learning with software engineering."
    assert:
      - type: javascript
        value: "output.length > 0"
